repos:
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3.13

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        language_version: python3.13

  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        language_version: python3.13

  # Django templates: ban multi-line ``{# ... #}`` comments. Django's
  # single-line comment syntax silently leaks literal text into rendered
  # HTML when the opener and closer aren't on the same line. Use
  # ``{% comment %} ... {% endcomment %}`` for anything spanning more
  # than one line.
  - repo: local
    hooks:
      - id: no-multiline-django-comments
        name: Reject multi-line {# … #} comments in Django templates
        entry: python3 scripts/check_template_comments.py
        language: system
        files: '\.html$'
        pass_filenames: true
