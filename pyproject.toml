[project]
name = "acta"
version = "0.4.0"
description = "Acta — a task tracker with bulk operations and an honest activity log."
requires-python = ">=3.13"

# Dependencies are pinned in requirements/base.txt, requirements/dev.txt,
# and requirements/prod.txt. This file holds only project metadata so uv
# can create a venv. Install deps with:
#   uv pip install -r requirements/dev.txt    # for local development
#   uv pip install -r requirements/prod.txt   # for production-like installs
dependencies = []


[tool.black]
line-length = 120
target-version = ["py313"]
# ``force-exclude`` (not ``extend-exclude``) is required when pre-commit
# passes file paths explicitly via the CLI. With plain ``extend-exclude``
# black honors the rule only when scanning a directory; with ``--all-files``
# pre-commit hands black each path individually and reformats anything not
# matched here. Auto-generated migrations + collected static must stay
# untouched, so they live in this stronger filter.
force-exclude = '''
/(
    \.git
  | \.github
  | \.idea
  | \.venv
  | migrations
  | static_collected
)/
'''


[tool.isort]
profile = "black"
line_length = 120
force_sort_within_sections = true
atomic = true
skip_glob = ["**/migrations/*", ".venv/*"]
known_django = ["django"]
known_first_party = ["acta", "apps"]
sections = ["FUTURE", "STDLIB", "DJANGO", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]


[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "acta.settings.dev"
pythonpath = ["."]
testpaths = ["apps"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "--reuse-db",
    "-v",
]
