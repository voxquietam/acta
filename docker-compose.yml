services:
  db:
    image: postgres:16
    # Fixed container name so CI / ops can target it explicitly
    # (`docker stop acta.db`, `docker logs acta.db`). Mirrors the
    # `<project>.<role>` convention used across the rest of the infra.
    container_name: acta.db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No host-port mapping in prod: ``web`` reaches the DB through the
    # internal compose network at ``db:5432``, and exposing Postgres to
    # the LAN would let anything in the admin's VPN connect directly,
    # bypassing every Django auth layer. ``docker-compose.dev.yml``
    # adds the mapping back so local IDE / psql tooling still works.
    volumes:
      - acta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/prod.txt
    container_name: acta.web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: &django_env
      DJANGO_SETTINGS_MODULE: acta.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      # Email — passed through so prod SMTP credentials in .env reach
      # the Django process. Each variable falls back to a sensible
      # default in ``acta/settings/base.py``; the four HOST_USER /
      # HOST_PASSWORD / DEFAULT_FROM_EMAIL ones need to be set in
      # .env on the prod VM for invite emails to actually go out.
      EMAIL_BACKEND: ${EMAIL_BACKEND:-}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-}
      # Telegram bot — DM notifications (set in .env to enable; absent = off).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      ACTA_PUBLIC_BASE_URL: ${ACTA_PUBLIC_BASE_URL:-}
      DJANGO_MEDIA_ROOT: ${DJANGO_MEDIA_ROOT:-/app/media}
      DJANGO_SENDFILE_BACKEND: ${DJANGO_SENDFILE_BACKEND:-simple}
      # Uvicorn worker processes (web only; qcluster ignores it). Each worker
      # is a full Django process — bump with care. Default 1.
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
    # Uploaded media (attachments, inline images, avatars) lives in a named
    # volume so it survives ``docker compose up --build`` / image rebuilds —
    # the container filesystem is otherwise ephemeral. Mounted at
    # ``/app/media``, matching MEDIA_ROOT. In dev the repo bind-mount masks
    # this path with the named volume at the subpath; that's fine — dev
    # media just lives in the volume too.
    volumes:
      - acta-media:/app/media
    # Host port 8001 by default — ksu24.back's runserver lives on 8000.
    # Override via WEB_HOST_PORT in .env when needed.
    ports:
      - "${WEB_HOST_PORT:-8001}:8000"

  # Recurring-job scheduler (django-q2). Reuses the web image + env (same DB
  # broker + media volume so file-touching jobs like gc_orphan_attachments
  # work). Replaces host crontab; schedules are editable in the admin.
  qcluster:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/prod.txt
    container_name: acta.qcluster
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment: *django_env
    volumes:
      - acta-media:/app/media
    # Bypass the web entrypoint (migrate / collectstatic) — the web service
    # owns those. The cluster just needs the DB, guaranteed ready by the
    # healthy ``depends_on``; it restarts until web has applied migrations.
    entrypoint: ["python", "manage.py", "qcluster"]

volumes:
  acta-pgdata:
  acta-media:
