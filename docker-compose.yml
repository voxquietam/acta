services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Host port 5433 — avoids collision with ksu24.back's Postgres on 5432.
    # The container still listens on 5432 internally; the web service talks to
    # `db:5432` over the compose network.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - acta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/prod.txt
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: acta.settings.prod
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
    # Host port 8001 by default — ksu24.back's runserver lives on 8000.
    # Override via WEB_HOST_PORT in .env when needed.
    ports:
      - "${WEB_HOST_PORT:-8001}:8000"

volumes:
  acta-pgdata:
