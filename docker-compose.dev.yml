services:
  db:
    # Dev-only host-port mapping so PyCharm Database tool, ``psql -h
    # localhost``, and other IDE integrations can reach the local
    # Postgres without going through ``docker compose exec``. Defaults
    # to 5433 to avoid colliding with ksu24.back's Postgres on 5432.
    # Override via POSTGRES_HOST_PORT in .env when needed.
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"

  web:
    build:
      context: .
      args:
        REQUIREMENTS: requirements/dev.txt
    environment:
      DJANGO_SETTINGS_MODULE: acta.settings.dev
    volumes:
      - .:/app
    # ``--timeout-graceful-shutdown 1``: on every WatchFiles auto-reload
    # uvicorn waits for in-flight connections to drain. SSE streams from
    # ``django-eventstream`` are long-lived, so without a cap the dev
    # server hangs several seconds on every save before serving the
    # next request — visible to the browser as a stalled page reload.
    command: >
      uvicorn acta.asgi:application
      --host 0.0.0.0
      --port 8000
      --reload
      --timeout-graceful-shutdown 1
