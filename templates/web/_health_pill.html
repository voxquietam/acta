{% load web_extras %}
{% comment %}
Project-update health badge. Expects ``health`` (a
``ProjectUpdate.HEALTH_*`` key) and ``health_labels`` in context.
{% endcomment %}
<span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded text-[9.5px] uppercase tracking-wider font-semibold shrink-0 {% if health == 'on_track' %}bg-emerald-100 dark:bg-emerald-900 text-emerald-700 dark:text-emerald-300{% elif health == 'at_risk' %}bg-amber-100 dark:bg-amber-900 text-amber-700 dark:text-amber-300{% elif health == 'off_track' %}bg-rose-100 dark:bg-rose-900 text-rose-700 dark:text-rose-300{% else %}bg-blue-100 dark:bg-blue-900 text-blue-700 dark:text-blue-300{% endif %}">
  <span class="w-1 h-1 rounded-full {% if health == 'on_track' %}bg-emerald-500{% elif health == 'at_risk' %}bg-amber-500{% elif health == 'off_track' %}bg-rose-500{% else %}bg-blue-500{% endif %}"></span>
  {{ health_labels|get_item:health|default:health }}
</span>
